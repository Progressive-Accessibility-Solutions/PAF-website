items:
  - title: "Educational Content Digitization"
    icon: "file-text"
    desc: "Transforming textbooks and learning materials into accessible formats, including complex mathematical expressions, scientific notation, and diagrams."
  - title: "Content Remediation"
    icon: "monitor"
    desc: "Converting digital and print content into formats meeting accessibility standards — transcription, captioning, audio description, sign language, Braille, and tactile formats."
  - title: "Research & Innovation"
    icon: "cpu"
    desc: "Advancing accessible communication through AI and emerging technologies for complex STEM content accessibility."
  - title: "Assistive Technology Development"
    icon: "wrench"
    desc: "Designing and deploying tools and software systems for accessible content conversion, diagram accessibility, and mathematical notation."
  - title: "User Research"
    icon: "users"
    desc: "Conducting needs assessments involving persons with disabilities to improve tools, workflows, and standards for accessible digitization."
